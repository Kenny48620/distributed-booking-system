services:
  postgres:
    image: postgres:15
    container_name: booking-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: booking_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: booking-redis
    ports:
      - "6379:6379"

  # kafka:
  #   image: apache/kafka:4.2.0
  #   container_name: booking-kafka
  #   ports:
  #     - "9092:9092"
  kafka:
    image: apache/kafka:4.2.0
    container_name: booking-kafka
    hostname: booking-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://booking-kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@booking-kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

  kafka-init:
    image: apache/kafka:4.2.0
    container_name: booking-kafka-init
    depends_on:
      - kafka
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      sleep 10 &&
      kafka-topics.sh --create --if-not-exists --topic payment_requested --bootstrap-server booking-kafka:9092 --partitions 1 --replication-factor 1 &&
      kafka-topics.sh --create --if-not-exists --topic payment_succeeded --bootstrap-server booking-kafka:9092 --partitions 1 --replication-factor 1 &&
      kafka-topics.sh --create --if-not-exists --topic payment_failed --bootstrap-server booking-kafka:9092 --partitions 1 --replication-factor 1 &&
      kafka-topics.sh --create --if-not-exists --topic booking_created --bootstrap-server booking-kafka:9092 --partitions 1 --replication-factor 1 &&
      kafka-topics.sh --create --if-not-exists --topic booking_created_retry --bootstrap-server booking-kafka:9092 --partitions 1 --replication-factor 1 &&
      kafka-topics.sh --create --if-not-exists --topic booking_created_dlq --bootstrap-server booking-kafka:9092 --partitions 1 --replication-factor 1 &&
      echo 'Kafka topics created.'
      "

  inventory-service:
    build: ./services/inventory-service
    container_name: inventory-service
    depends_on:
      - postgres
    ports:
      - "8001:8001"

  booking-service:
    build: ./services/booking-service
    container_name: booking-service
    depends_on:
      - postgres
      - inventory-service
    ports:
      - "8000:8000"

  notification-worker:
    build: ./services/notification-worker
    container_name: notification-worker
    depends_on:
      - kafka
    restart: unless-stopped
  payment-service:
      build: ./services/payment-service
      container_name: payment-service
      depends_on:
        - kafka
      restart: unless-stopped
      
volumes:
  postgres_data: